# Tag-triggered release pipeline.
#
# Push a tag like `v0.6.0` or `v0.6.0-rc1` and this workflow:
#   1. Builds dist/Murmur.app on macos-14 (Apple Silicon) via the existing
#      build.sh, which already does PyInstaller + Info.plist patch + ad-hoc
#      codesign.
#   2. Wraps the .app in a Murmur-<tag>.dmg using `hdiutil create` directly.
#      We chose hdiutil over a third-party action (e.g. LinusU/action-create-dmg)
#      because the maintained actions all wrap hdiutil anyway, add layout/styling
#      knobs we don't need for v1.0, and pull in extra dependencies. A two-line
#      `hdiutil create` is auditable and has no supply-chain surface beyond what
#      Apple ships with the runner.
#   3. Drafts a GitHub Release for the tag and attaches the dmg.
#
# Distribution notes (v1.0):
#   The .app is ad-hoc signed only — it is NOT signed with an Apple Developer ID
#   and is NOT notarized. First-launch users will need to right-click → Open or
#   clear the quarantine bit (`xattr -dr com.apple.quarantine Murmur.app`).
#   Buying a Developer ID cert ($99/year) and wiring up notarytool is tracked
#   in the v1.1+ backlog in ROADMAP.md.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # needed by softprops/action-gh-release to create the release

jobs:
  build:
    name: Build and release macOS dmg
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read pinned Python version
        id: python_version
        run: echo "version=$(cat .python-version)" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ steps.python_version.outputs.version }}

      - name: Set up uv
        # Pinned to a specific patch tag because astral-sh/setup-uv
        # stopped publishing moveable major/minor tags as of v8.0:
        # ``@v3`` was removed (broke v0.6.0), ``@v8`` was never
        # published (broke v0.6.1). Update this pin manually when a
        # newer patch ships and we need its features.
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Cache uv + venv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml', '.python-version') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Create venv and install project (gui + build extras)
        # build.sh expects .venv/bin/python to exist and re-runs the install
        # itself, but seeding the venv here lets the cache do real work on
        # subsequent runs. Pin the interpreter to the .python-version value
        # so a cache hit doesn't drift across runner image bumps.
        run: |
          uv venv --python "${{ steps.python_version.outputs.version }}" .venv
          uv pip install --python .venv/bin/python -e ".[gui,build]"

      - name: Build Murmur.app
        run: ./build.sh

      - name: Resolve tag name
        id: tag
        run: echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Package Murmur.app into a dmg
        # hdiutil ships with macOS — no extra action needed. UDZO = compressed
        # read-only image, which is the standard format for distributable dmgs.
        run: |
          DMG="Murmur-${{ steps.tag.outputs.name }}.dmg"
          STAGE="$(mktemp -d)"
          cp -R dist/Murmur.app "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create \
            -volname "Murmur ${{ steps.tag.outputs.name }}" \
            -srcfolder "$STAGE" \
            -ov \
            -format UDZO \
            "$DMG"
          echo "DMG_PATH=$DMG" >> "$GITHUB_ENV"

      - name: Upload dmg as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Murmur-${{ steps.tag.outputs.name }}-dmg
          path: ${{ env.DMG_PATH }}
          if-no-files-found: error

      - name: Create GitHub Release and attach dmg
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Murmur ${{ steps.tag.outputs.name }}
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: ${{ env.DMG_PATH }}
