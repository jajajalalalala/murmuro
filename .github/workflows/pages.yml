# Auto-deploy the Murmuro splash page to GitHub Pages.
#
# Trigger: any push to ``main`` that touches ``docs/site/`` (or the
# workflow itself). The job uploads the static site directory as the
# Pages artifact and lets ``actions/deploy-pages`` publish it.
#
# Repo setup (one-time, on github.com):
#   Settings → Pages → Build and deployment → Source = GitHub Actions
#
# Live URL once enabled: https://jajajalalalala.github.io/murmuro/

name: Deploy Pages

on:
  push:
    branches: ["main"]
    paths:
      - "docs/site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Required for ``actions/deploy-pages``. ``id-token`` is the Pages
# OIDC handshake; ``contents`` is the checkout.
permissions:
  contents: read
  pages: write
  id-token: write

# Single in-flight deploy at a time — newer pushes cancel pending runs
# so we don't race two artifacts uploading simultaneously.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
